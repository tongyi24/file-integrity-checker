<script>
// ==================== SHA-256 ====================
const SHA256K = new Uint32Array([
  0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
  0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
  0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
  0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
  0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
  0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
  0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
  0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
]);

class SHA256 {
  constructor() {
    this.H = new Uint32Array([0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19]);
    this.buf = new Uint8Array(64);
    this.pos = 0;
    this.total = 0;
  }
  _compress(b) {
    const W = new Uint32Array(64);
    for (let i=0;i<16;i++) W[i]=(b[i*4]<<24)|(b[i*4+1]<<16)|(b[i*4+2]<<8)|b[i*4+3];
    for (let i=16;i<64;i++) {
      const s0=((W[i-15]>>>7)|(W[i-15]<<25))^((W[i-15]>>>18)|(W[i-15]<<14))^(W[i-15]>>>3);
      const s1=((W[i-2]>>>17)|(W[i-2]<<15))^((W[i-2]>>>19)|(W[i-2]<<13))^(W[i-2]>>>10);
      W[i]=(W[i-16]+s0+W[i-7]+s1)|0;
    }
    let [a,b2,c,d,e,f,g,h]=this.H;
    for (let i=0;i<64;i++) {
      const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));
      const ch=(e&f)^(~e&g);
      const t1=(h+S1+ch+SHA256K[i]+W[i])|0;
      const S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));
      const maj=(a&b2)^(a&c)^(b2&c);
      const t2=(S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b2;b2=a;a=(t1+t2)|0;
    }
    this.H[0]=(this.H[0]+a)|0;this.H[1]=(this.H[1]+b2)|0;this.H[2]=(this.H[2]+c)|0;this.H[3]=(this.H[3]+d)|0;
    this.H[4]=(this.H[4]+e)|0;this.H[5]=(this.H[5]+f)|0;this.H[6]=(this.H[6]+g)|0;this.H[7]=(this.H[7]+h)|0;
  }
  update(data) {
    const u8 = data instanceof Uint8Array ? data : new Uint8Array(data);
    this.total += u8.length;
    let i = 0;
    if (this.pos > 0) {
      while (i < u8.length && this.pos < 64) this.buf[this.pos++] = u8[i++];
      if (this.pos === 64) { this._compress(this.buf); this.pos = 0; }
    }
    while (i + 64 <= u8.length) { this._compress(u8.subarray(i, i + 64)); i += 64; }
    while (i < u8.length) this.buf[this.pos++] = u8[i++];
  }
  hex() {
    const total = this.total;
    this.buf[this.pos++] = 0x80;
    if (this.pos > 56) { while (this.pos < 64) this.buf[this.pos++] = 0; this._compress(this.buf); this.pos = 0; }
    while (this.pos < 56) this.buf[this.pos++] = 0;
    const bits = total * 8;
    const hi = Math.floor(bits / 4294967296);
    const lo = bits % 4294967296;
    this.buf[56]=(hi>>>24)&0xff;this.buf[57]=(hi>>>16)&0xff;this.buf[58]=(hi>>>8)&0xff;this.buf[59]=hi&0xff;
    this.buf[60]=(lo>>>24)&0xff;this.buf[61]=(lo>>>16)&0xff;this.buf[62]=(lo>>>8)&0xff;this.buf[63]=lo&0xff;
    this._compress(this.buf);
    return Array.from(this.H).map(w=>(w>>>0).toString(16).padStart(8,'0')).join('').toUpperCase();
  }
}

// ==================== File Utilities ====================
const CHUNK = 4 * 1024 * 1024;

async function hashFile(file, onProgress) {
  const sha = new SHA256();
  const size = file.size;
  let offset = 0;
  while (offset < size) {
    const end = Math.min(offset + CHUNK, size);
    const buf = await file.slice(offset, end).arrayBuffer();
    sha.update(new Uint8Array(buf));
    offset = end;
    if (onProgress) onProgress(offset / size);
    await new Promise(r => setTimeout(r, 0));
  }
  return sha.hex();
}

function collectFolder(input) {
  const files = Array.from(input.files).filter(f => !f.name.startsWith('.'));
  if (!files.length) return { name: '', files: [] };
  const base = files[0].webkitRelativePath.split('/')[0];
  return {
    name: base,
    files: files.map(f => ({
      rel: f.webkitRelativePath.substring(base.length + 1),
      file: f
    })).sort((a, b) => a.rel.localeCompare(b.rel))
  };
}

// ==================== Cache (localStorage) ====================
const CACHE_KEY = 'fic_cache';
function loadCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch { return {}; } }
function saveCache(c) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch {} }
function cacheKey(name, rel, size, mtime) { return `${name}/${rel}|${size}|${mtime}`; }

function copyHash(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const tip = document.createElement('span');
    tip.className = 'copied-tip';
    tip.textContent = t('copied');
    el.appendChild(tip);
    setTimeout(() => tip.remove(), 1200);
  }).catch(() => {});
}

function copyableHashHtml(hash) {
  const esc = hash.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  return `<span class="copyable" style="font-family:monospace;font-size:11px" data-hash="${esc}" onclick="copyHash(this.dataset.hash,this)" title="Copy">📋 ${esc}</span>`;
}

function formatETA(seconds) {
  if (!isFinite(seconds) || seconds < 0 || seconds === Infinity) return '';
  if (seconds < 60) return '~' + Math.round(seconds) + 's';
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return '~' + m + 'm ' + s + 's';
}

function updateProgressStatus(elId, current, total, label, startTime) {
  const elapsed = (Date.now() - startTime) / 1000;
  const rate = current > 0 ? elapsed / current : 0;
  const remaining = rate > 0 ? (total - current) * rate : 0;
  const eta = formatETA(remaining);
  let msg = `Processing ${current}/${total} files...`;
  if (label) msg += ' ' + label;
  if (eta) msg += ' ETA: ' + eta;
  $(elId).textContent = msg;
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  } catch (e) {}
}

function notifyComplete(body) {
  playBeep();
  if (document.hidden) {
    if (!notifyPermRequested && Notification.permission === 'default') {
      notifyPermRequested = true;
      Notification.requestPermission();
    }
    if (Notification.permission === 'granted') {
      new Notification(t('notify_complete'), { body: body || '' });
    }
  }
}

function csvEscape(s) {
  s = String(s ?? '');
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function saveCSV(prefix) {
  if (!results.length) { alert(t('alert_no_results')); return; }
  const lines = ['File,Status,Details'];
  for (const r of results) lines.push([csvEscape(r.file), csvEscape(r.status), csvEscape(r.detail || '')].join(','));
  downloadText(lines.join('\n'), prefix + '_report_' + new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-') + '.csv');
}

const FILTER_MAP = { ok: ['OK', 'CACHED'], fail: ['FAIL'], missing: ['MISSING', 'MISSING_B'], extra: ['EXTRA'], relocated: ['RELOCATED'] };

function matchesFilter(status, filter) {
  if (filter === 'all') return true;
  return (FILTER_MAP[filter] || []).includes(status);
}

  currentFilter = filter;

  const tbody = $(prefix + '-tbody');

    tbody.querySelectorAll('tr').forEach(tr => {
      tr.style.display = matchesFilter(tr.dataset.status || '', filter) ? '' : 'none';
    });

}

function buildFilterBar(prefix, statuses) {
  const all = [{ k: 'all', label: 'btn_filter_all' }];
  const defs = [
    { k: 'ok', label: 'btn_filter_ok' },
    { k: 'fail', label: 'btn_filter_fail' },
    { k: 'missing', label: 'btn_filter_missing' },
    { k: 'extra', label: 'btn_filter_extra' },
    { k: 'relocated', label: 'btn_filter_relocated' }
  ];
  for (const d of defs) {
    if (statuses.some(s => (FILTER_MAP[d.k] || []).includes(s))) all.push(d);
  }
  return all.map(d =>
    `<button class="filter-btn${d.k === 'all' ? ' active' : ''}" data-filter="${d.k}" onclick="setFilter('${prefix}','${d.k}',this)">${t(d.label)}</button>`
  ).join('');
}

function insertIntoTree(root, path, file) {
  const parts = path.replace(/\\/g, '/').split('/');
  let cur = root;
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    if (i === parts.length - 1) {
      cur[p] = { type: 'file', data: file };
    } else {
      if (!cur[p] || cur[p].type === 'file') cur[p] = { type: 'folder', children: {} };
      cur = cur[p].children;
    }
  }
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderTreeNode(node, indent) {
  let html = '';
  const keys = Object.keys(node).sort((a, b) => {
    const ta = node[a].type, tb = node[b].type;
    if (ta !== tb) return ta === 'folder' ? -1 : 1;
    return a.localeCompare(b);
  });
  for (const k of keys) {
    const n = node[k];
    const ek = escHtml(k);
    if (n.type === 'file') {
      html += `<div style="padding:3px 0;padding-left:${indent}px">📄 ${ek} ${statusTag(n.data.status)}</div>`;
    } else {
      const childHtml = renderTreeNode(n.children, indent + 20);
      if (!childHtml) continue;
      html += `<div style="padding:3px 0;padding-left:${indent}px;cursor:pointer;font-weight:500" onclick="this.nextElementSibling.classList.toggle('collapsed')">📁 ${ek}</div>`;
      html += `<div class="tree-children">${childHtml}</div>`;
    }
  }
  return html;
}

function refreshCmpTree() {
  const wrap = $('cmp-tree-wrap');
  if (!wrap || !results.length) { if (wrap) wrap.innerHTML = ''; return; }
  const filtered = results.filter(r => matchesFilter(r.status, currentFilter));
  const root = {};
  for (const r of filtered) insertIntoTree(root, r.file, r);
  wrap.innerHTML = renderTreeNode(root, 0) || `<div style="padding:16px;color:#888">${t('no_results')}</div>`;
}

function getTabAction() {

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && running) { stopAll(); return; }
  if (isInputFocused()) return;
  if (e.key >= '1' && e.key <= '5' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const idx = parseInt(e.key, 10) - 1;
    if (TAB_IDS[idx]) switchTab(TAB_IDS[idx]);
    return;
  }
  if ((e.key === 'Enter') && !running) {
    const fn = getTabAction();
    if (fn) { e.preventDefault(); fn(); }
  }
});

// ==================== UI Helpers ====================
function $(id) { return document.getElementById(id); }
function statusTag(s) {
  const key = 'status_' + s.toLowerCase().replace('_b', '_b');
  const display = t(key) || s;
  return `<span class="tag tag-${s.toLowerCase()}">${display}</span>`;
}

function translateDetail(d) {
  if (!d) return '';
  const map = {
    'Hash mismatch': 'detail_hash_mismatch',
    'Only in A': 'detail_only_in_a',
    'Only in B': 'detail_only_in_b',
    'Not found': 'detail_not_found',
    'File not found': 'detail_not_found',
    'File not found (even with flexible matching)': 'detail_not_found_flex',
  };
  if (map[d]) return t(map[d]);
  if (d.startsWith('Matched: ')) return `${t('detail_matched')}: ${d.slice(9)}`;
  if (d.startsWith('Content match: ')) return `${t('detail_content_match')}: ${d.slice(15)}`;
  const m = d.match(/^A:(.+) = B:(.+)$/);
  if (m) return `${t('detail_same_content')}: A:${m[1]} = B:${m[2]}`;
  return d;
}

function formatSummary(s) {
  if (!s) return '';
  if (s.stopped) return t('summary_stopped');
  if (s.kind === 'gen') return `${t('summary_generated')} ${s.count} ${t('summary_checksums')}`;
  if (s.kind === 'cmp') {
    if (s.failed === 0 && s.missing === 0 && s.extra === 0) {
      const parts = [`${t('summary_all_match')} ${t('summary_passed')}: ${s.passed}`];
      if (s.relocated) parts.push(`${t('summary_relocated')}: ${s.relocated}`);
      if (s.cachedN) parts.push(`${t('summary_cached')}: ${s.cachedN}`);
      return parts.join(' | ');
    }
    const parts = [`${t('summary_passed')}: ${s.passed}`];
    if (s.relocated) parts.push(`${t('summary_relocated')}: ${s.relocated}`);
    if (s.failed) parts.push(`${t('summary_failed')}: ${s.failed}`);
    if (s.missing) parts.push(`${t('summary_missing')}: ${s.missing}`);
    if (s.extra) parts.push(`${t('summary_extra')}: ${s.extra}`);
    return parts.join(' | ');
  }
  if (s.kind === 'ver') {
    if (s.failed === 0 && s.missing === 0) {
      const parts = [`${t('summary_all_passed')} ${t('summary_passed')}: ${s.passed}`];
      if (s.cachedN) parts.push(`${t('summary_cached')}: ${s.cachedN}`);
      if (s.flexMatched) parts.push(`${t('summary_flex_matched')}: ${s.flexMatched}`);
      parts.push(`${t('summary_total')}: ${s.total}`);
      return parts.join(' | ');
    }
    const parts = [`${t('summary_passed')}: ${s.passed}`];
    if (s.cachedN) parts.push(`${t('summary_cached')}: ${s.cachedN}`);
    if (s.flexMatched) parts.push(`${t('summary_flex_matched')}: ${s.flexMatched}`);
    if (s.failed) parts.push(`${t('summary_failed')}: ${s.failed}`);
    if (s.missing) parts.push(`${t('summary_missing')}: ${s.missing}`);
    parts.push(`${t('summary_total')}: ${s.total}`);
    return parts.join(' | ');
  }
  return '';
}

function restoreResultTables() {
  if (!results.length || !resultsSource) return;
  if (resultsSource === 'cmp') {
    const tbody = $('cmp-tbody');
    if (tbody) {
      tbody.innerHTML = '';
      for (const r of results) addRow(tbody, [r.file, r.status, translateDetail(r.detail)]);
    }
    const fb = $('cmp-filter-bar');
    if (fb) fb.innerHTML = buildFilterBar('cmp', results.map(r => r.status));
    if (cmpViewMode === 'tree') refreshCmpTree();
  } else if (resultsSource === 'ver') {
    const tbody = $('ver-tbody');
    if (tbody) {
      tbody.innerHTML = '';
      for (const r of results) addRow(tbody, [r.file, r.status, translateDetail(r.detail)]);
    }
    const fb = $('ver-filter-bar');
    if (fb) fb.innerHTML = buildFilterBar('ver', results.map(r => r.status));
  } else if (resultsSource === 'gen') {
    const tbody = $('gen-tbody');
    if (tbody) {
      tbody.innerHTML = '';
      for (const r of results) addGenRow(r.file, r.detail);
    }
  }
  if (lastSummary) {
    const smEl = $(lastSummary.elId);
    if (smEl) {
      smEl.textContent = formatSummary(lastSummary);
      smEl.className = 'summary ' + lastSummary.color;
      smEl.style.display = 'block';
    }
  }
}

function addRow(tbody, cols) {
  const tr = document.createElement('tr');
  const status = cols[1];
  tr.dataset.status = status;
  tr.innerHTML = cols.map((c, i) => `<td>${i === 1 ? statusTag(c) : c}</td>`).join('');
  tbody.appendChild(tr);
  const wrap = tbody.closest('.results-wrap');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function addGenRow(rel, hash) {
  const tr = document.createElement('tr');
  tr.dataset.status = 'DONE';
  tr.innerHTML = `<td>${rel}</td><td>${copyableHashHtml(hash)}</td>`;
  $('gen-tbody').appendChild(tr);

  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = filename;

}

// ==================== Drag & Drop ====================
async function traverseEntry(entry) {
  if (entry.isFile) {
    return new Promise(resolve => entry.file(f => {
      f._fullPath = entry.fullPath;
      resolve([f]);
    }));
  }
  if (entry.isDirectory) {
    const reader = entry.createReader();
    const all = [];
    const readBatch = () => new Promise(resolve => reader.readEntries(resolve));
    let batch;
    do { batch = await readBatch(); for (const e of batch) all.push(...await traverseEntry(e)); } while (batch.length);
    return all;
  }
  return [];
}

function collectDroppedFolder(files, rootName) {
  const filtered = files.filter(f => !f.name.startsWith('.'));
  if (!filtered.length) return { name: '', files: [] };
  return {
    name: rootName || 'drop',
    files: filtered.map(f => {
      let rel = (f._fullPath || '/' + f.name).replace(/^\/[^/]*\//, '');
      if (!rel) rel = f.name;
      return { rel, file: f };
    }).sort((a, b) => a.rel.localeCompare(b.rel))
  };
}

function setupDrop(displayId, inputId, handler) {
  const el = document.getElementById(displayId);
  if (!el) return;
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', e => { e.preventDefault(); e.stopPropagation(); el.classList.remove('dragover'); });
  el.addEventListener('drop', async e => {
    e.preventDefault(); e.stopPropagation(); el.classList.remove('dragover');
    const items = e.dataTransfer.items;
    if (!items || !items.length) return;
    const entries = [];
    for (const item of items) {
      const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
      if (entry) entries.push(entry);
    }
    if (!entries.length) return;
    if (entries[0].isDirectory) {
      const allFiles = await traverseEntry(entries[0]);
      handler(allFiles, entries[0].name);
    } else {
      const files = Array.from(e.dataTransfer.files);
      handler(files, null);
    }
  });
}

// ==================== Compare ====================
async function startCompare() {
  if (!cmpA || !cmpB || !cmpA.files.length || !cmpB.files.length) { alert(t('alert_select_folders')); return; }
  running = true;
  $('cmp-start').disabled = true; $('cmp-stop').disabled = false;
  $('cmp-tbody').innerHTML = '';
  const smEl = $('cmp-summary'); smEl.style.display = 'none';
  results = [];
  resultsSource = 'cmp';
  lastSummary = null;

  const cache = loadCache();
  const bMap = {};
  for (const f of cmpB.files) bMap[f.rel] = f;

  const total = cmpA.files.length + Object.keys(bMap).length;
  let step = 0, passed = 0, failed = 0, relocated = 0, cachedN = 0;
  const startTime = Date.now();
  const unmatchedA = [];
  const matchedB = new Set();

  for (const fa of cmpA.files) {
    if (!running) break;
    step++;
    $('cmp-prog').style.width = (step / total * 100) + '%';
    updateProgressStatus('cmp-status', step, total, 'A: ' + fa.rel, startTime);

    const ckA = cacheKey(cmpA.name, fa.rel, fa.file.size, fa.file.lastModified);
    let hA = cache[ckA];
    const aCached = !!hA;
    if (!hA) { hA = await hashFile(fa.file); cache[ckA] = hA; }

    const fb = bMap[fa.rel];
    if (!fb) {
      unmatchedA.push({ rel: fa.rel, hash: hA });
      continue;
    }
    matchedB.add(fa.rel);

    const ckB = cacheKey(cmpB.name, fb.rel, fb.file.size, fb.file.lastModified);
    let hB = cache[ckB];
    const bCached = !!hB;
    if (!hB) { hB = await hashFile(fb.file); cache[ckB] = hB; }

    if (hA === hB) {
      const tag = (aCached && bCached) ? 'CACHED' : 'OK';
      addRow($('cmp-tbody'), [fa.rel, tag, '']);
      results.push({ file: fa.rel, status: tag, detail: '' });
      passed++;
      if (tag === 'CACHED') cachedN++;
    } else {
      addRow($('cmp-tbody'), [fa.rel, 'FAIL', t('detail_hash_mismatch')]);
      results.push({ file: fa.rel, status: 'FAIL', detail: 'Hash mismatch' });
      failed++;
    }
  }

  const unmatchedBList = [];
  for (const fb of cmpB.files) {
    if (!running) break;
    if (matchedB.has(fb.rel)) continue;
    step++;
    $('cmp-prog').style.width = (step / total * 100) + '%';
    updateProgressStatus('cmp-status', step, total, 'B: ' + fb.rel, startTime);
    const ckB = cacheKey(cmpB.name, fb.rel, fb.file.size, fb.file.lastModified);
    let hB = cache[ckB];
    if (!hB) { hB = await hashFile(fb.file); cache[ckB] = hB; }
    unmatchedBList.push({ rel: fb.rel, hash: hB });
  }

  if (unmatchedA.length && unmatchedBList.length) {
    const bByHash = {};
    for (const b of unmatchedBList) { if (!bByHash[b.hash]) bByHash[b.hash] = []; bByHash[b.hash].push(b.rel); }
    const stillMissing = [];
    for (const a of unmatchedA) {
      const cands = bByHash[a.hash];
      if (cands && cands.length) {
        const matchRel = cands.shift();
        addRow($('cmp-tbody'), [a.rel, 'RELOCATED', `${t('detail_same_content')}: A:${a.rel} = B:${matchRel}`]);
        results.push({ file: a.rel, status: 'RELOCATED', detail: `A:${a.rel} = B:${matchRel}` });
        relocated++;
        unmatchedBList.splice(unmatchedBList.findIndex(x => x.rel === matchRel), 1);
      } else stillMissing.push(a.rel);
    }
    for (const r of stillMissing) { addRow($('cmp-tbody'), [r, 'MISSING_B', t('detail_only_in_a')]); results.push({file:r,status:'MISSING_B',detail:'Only in A'}); }
    for (const b of unmatchedBList) { addRow($('cmp-tbody'), [b.rel, 'EXTRA', t('detail_only_in_b')]); results.push({file:b.rel,status:'EXTRA',detail:'Only in B'}); }
  } else {
    for (const a of unmatchedA) { addRow($('cmp-tbody'), [a.rel, 'MISSING_B', t('detail_only_in_a')]); results.push({file:a.rel,status:'MISSING_B',detail:'Only in A'}); }
    for (const b of unmatchedBList) { addRow($('cmp-tbody'), [b.rel, 'EXTRA', t('detail_only_in_b')]); results.push({file:b.rel,status:'EXTRA',detail:'Only in B'}); }
  }

  saveCache(cache);
  const missing = results.filter(r=>r.status==='MISSING_B').length;
  const extra = results.filter(r=>r.status==='EXTRA').length;

  let summaryText, summaryColor;
  if (!running) { summaryText = t('summary_stopped'); summaryColor = 'orange'; }
  else if (failed === 0 && missing === 0 && extra === 0) {
    const parts = [`${t('summary_all_match')} ${t('summary_passed')}: ${passed}`];
    if (relocated) parts.push(`${t('summary_relocated')}: ${relocated}`);
    if (cachedN) parts.push(`${t('summary_cached')}: ${cachedN}`);
    summaryText = parts.join(' | '); summaryColor = 'green';
  } else {
    const parts = [`${t('summary_passed')}: ${passed}`];
    if (relocated) parts.push(`${t('summary_relocated')}: ${relocated}`);
    if (failed) parts.push(`${t('summary_failed')}: ${failed}`);
    if (missing) parts.push(`${t('summary_missing')}: ${missing}`);
    if (extra) parts.push(`${t('summary_extra')}: ${extra}`);
    summaryText = parts.join(' | '); summaryColor = failed ? 'red' : 'orange';
  }
  smEl.textContent = summaryText; smEl.className = 'summary ' + summaryColor; smEl.style.display = 'block';
  lastSummary = { elId: 'cmp-summary', color: summaryColor, kind: 'cmp', stopped: !running, passed, failed, missing, extra, relocated, cachedN };
  $('cmp-status').textContent = t('progress_done'); $('cmp-prog').style.width = '100%';
  const fb = $('cmp-filter-bar');
  if (fb) fb.innerHTML = buildFilterBar('cmp', results.map(r => r.status));
  if (cmpViewMode === 'tree') refreshCmpTree();
  notifyComplete(summaryText);
  running = false; $('cmp-start').disabled = false; $('cmp-stop').disabled = true;
}

// ==================== Generate ====================
async function startGenerate() {
  const src = getGenSource();
  if (!src || !src.files.length) { alert(t('alert_select_folder')); return; }
  running = true;
  $('gen-start').disabled = true; $('gen-stop').disabled = false;
  $('gen-tbody').innerHTML = '';
  const smEl = $('gen-summary'); smEl.style.display = 'none';
  results = [];
  resultsSource = 'gen';
  lastSummary = null;

  const total = src.files.length;
  const lines = [];
  const startTime = Date.now();

  for (let i = 0; i < total; i++) {
    if (!running) break;
    const f = src.files[i];
    $('gen-prog').style.width = Math.round((i + 1) / total * 100) + '%';
    updateProgressStatus('gen-status', i + 1, total, f.rel, startTime);

    const h = await hashFile(f.file);
    const unixRel = f.rel.replace(/\\/g, '/');
    lines.push(`${h.toLowerCase()}  ./${unixRel}`);
    addGenRow(f.rel, h);
    results.push({ file: f.rel, status: 'DONE', detail: h });
  }

  if (running) {
    downloadText(lines.join('\n') + '\n', src.name + '_checksums.txt');
    const genSummary = `${t('summary_generated')} ${lines.length} ${t('summary_checksums')}`;
    smEl.textContent = genSummary;
    smEl.className = 'summary green'; smEl.style.display = 'block';
    lastSummary = { elId: 'gen-summary', color: 'green', kind: 'gen', stopped: false, count: lines.length };
    notifyComplete(genSummary);
  } else {
    smEl.textContent = t('summary_stopped'); smEl.className = 'summary orange'; smEl.style.display = 'block';
    lastSummary = { elId: 'gen-summary', color: 'orange', kind: 'gen', stopped: true, count: lines.length };
  }
  $('gen-status').textContent = t('progress_done'); $('gen-prog').style.width = '100%';
  running = false; $('gen-start').disabled = false; $('gen-stop').disabled = true;
}

// ==================== Verify ====================
async function startVerify() {
  if (!verCsText || !verDir || !verDir.files.length) { alert(t('alert_select_both')); return; }
  running = true;
  $('ver-start').disabled = true; $('ver-stop').disabled = false;
  $('ver-tbody').innerHTML = '';
  const smEl = $('ver-summary'); smEl.style.display = 'none';
  results = [];
  resultsSource = 'ver';
  lastSummary = null;

  const flexible = $('ver-flexible').checked;
  const cache = loadCache();
  const entries = [];
  for (const line of verCsText.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split('  ', 1 + 1);
    if (parts.length !== 2) continue;
    let rel = parts[1].trim();
    if (rel.startsWith('./')) rel = rel.substring(2);
    entries.push({ expected: parts[0].trim().toUpperCase(), rel });
  }

  const fileMap = {};
  const fileByName = {};
  for (const f of verDir.files) {
    fileMap[f.rel] = f;
    const name = f.rel.split('/').pop();
    if (!fileByName[name]) fileByName[name] = [];
    fileByName[name].push(f);
  }

  const total = entries.length;
  let passed = 0, failed = 0, missing = 0, cachedN = 0, flexMatched = 0;
  const startTime = Date.now();
  const usedFiles = new Set();
  const unmatchedEntries = [];

  for (let i = 0; i < total; i++) {
    if (!running) break;
    const e = entries[i];
    $('ver-prog').style.width = Math.round((i + 1) / total * 100) + '%';
    updateProgressStatus('ver-status', i + 1, total, e.rel, startTime);

    let fd = fileMap[e.rel] || fileMap[e.rel.replace(/\//g, '\\')];

    if (!fd && flexible) {
      const name = e.rel.split('/').pop();
      const candidates = (fileByName[name] || []).filter(c => !usedFiles.has(c.rel));
      if (candidates.length === 1) fd = candidates[0];
      else if (candidates.length > 1) {
        for (const c of candidates) {
          const ck = cacheKey(verDir.name, c.rel, c.file.size, c.file.lastModified);
          let h = cache[ck];
          if (!h) { h = await hashFile(c.file); cache[ck] = h; }
          if (h === e.expected) { fd = c; break; }
        }
        if (!fd) fd = candidates[0];
      }
    }

    if (!fd) {
      if (flexible) {
        unmatchedEntries.push(e);
      } else {
        addRow($('ver-tbody'), [e.rel, 'MISSING', t('detail_not_found')]);
        results.push({ file: e.rel, status: 'MISSING', detail: 'Not found' });
        missing++;
      }
      continue;
    }

    usedFiles.add(fd.rel);
    const ck = cacheKey(verDir.name, fd.rel, fd.file.size, fd.file.lastModified);
    let h = cache[ck];
    if (h && h === e.expected) {
      const detail = (fd.rel !== e.rel) ? `${t('detail_matched')}: ${fd.rel}` : '';
      const tag = (fd.rel !== e.rel) ? 'OK' : 'CACHED';
      addRow($('ver-tbody'), [e.rel, tag, detail]);
      results.push({ file: e.rel, status: tag, detail: fd.rel !== e.rel ? `Matched: ${fd.rel}` : '' });
      passed++;
      if (tag === 'CACHED') cachedN++;
      if (fd.rel !== e.rel) flexMatched++;
      continue;
    }

    if (!h) { h = await hashFile(fd.file); cache[ck] = h; }

    if (h === e.expected) {
      const detail = (fd.rel !== e.rel) ? `${t('detail_matched')}: ${fd.rel}` : '';
      addRow($('ver-tbody'), [e.rel, 'OK', detail]);
      results.push({ file: e.rel, status: 'OK', detail: fd.rel !== e.rel ? `Matched: ${fd.rel}` : '' });
      passed++;
      if (fd.rel !== e.rel) flexMatched++;
    } else {
      addRow($('ver-tbody'), [e.rel, 'FAIL', t('detail_hash_mismatch')]);
      results.push({ file: e.rel, status: 'FAIL', detail: 'Hash mismatch' });
      failed++;
    }
  }

  if (flexible && unmatchedEntries.length) {
    $('ver-status').textContent = t('progress_content_matching');
    await new Promise(r => setTimeout(r, 0));
    const unusedFiles = verDir.files.filter(f => !usedFiles.has(f.rel));
    const unusedHashes = {};
    for (const uf of unusedFiles) {
      if (!running) break;
      const ck = cacheKey(verDir.name, uf.rel, uf.file.size, uf.file.lastModified);
      let h = cache[ck];
      if (!h) { h = await hashFile(uf.file); cache[ck] = h; }
      if (!unusedHashes[h]) unusedHashes[h] = [];
      unusedHashes[h].push(uf.rel);
    }
    for (const e of unmatchedEntries) {
      const cands = unusedHashes[e.expected];
      if (cands && cands.length) {
        const matchRel = cands.shift();
        addRow($('ver-tbody'), [e.rel, 'OK', `${t('detail_content_match')}: ${matchRel}`]);
        results.push({ file: e.rel, status: 'OK', detail: `Content match: ${matchRel}` });
        passed++;
        flexMatched++;
      } else {
        addRow($('ver-tbody'), [e.rel, 'MISSING', t('detail_not_found_flex')]);
        results.push({ file: e.rel, status: 'MISSING', detail: 'Not found' });
        missing++;
      }
    }
  }

  saveCache(cache);
  let summaryText, summaryColor;
  if (!running) { summaryText = t('summary_stopped'); summaryColor = 'orange'; }
  else if (failed === 0 && missing === 0) {
    const parts = [`${t('summary_all_passed')} ${t('summary_passed')}: ${passed}`];
    if (cachedN) parts.push(`${t('summary_cached')}: ${cachedN}`);
    if (flexMatched) parts.push(`${t('summary_flex_matched')}: ${flexMatched}`);
    parts.push(`${t('summary_total')}: ${total}`);
    summaryText = parts.join(' | '); summaryColor = 'green';
  } else {
    const parts = [`${t('summary_passed')}: ${passed}`];
    if (cachedN) parts.push(`${t('summary_cached')}: ${cachedN}`);
    if (flexMatched) parts.push(`${t('summary_flex_matched')}: ${flexMatched}`);
    if (failed) parts.push(`${t('summary_failed')}: ${failed}`);
    if (missing) parts.push(`${t('summary_missing')}: ${missing}`);
    parts.push(`${t('summary_total')}: ${total}`);
    summaryText = parts.join(' | '); summaryColor = 'red';
  }
  smEl.textContent = summaryText; smEl.className = 'summary ' + summaryColor; smEl.style.display = 'block';
  lastSummary = { elId: 'ver-summary', color: summaryColor, kind: 'ver', stopped: !running, passed, failed, missing, cachedN, flexMatched, total };
  $('ver-status').textContent = t('progress_done'); $('ver-prog').style.width = '100%';
  const vfb = $('ver-filter-bar');
  if (vfb) vfb.innerHTML = buildFilterBar('ver', results.map(r => r.status));
  notifyComplete(summaryText);
  running = false; $('ver-start').disabled = false; $('ver-stop').disabled = true;
}

// ==================== Utilities ====================
function clearCache() { localStorage.removeItem(CACHE_KEY); alert(t('alert_cache_cleared')); }

function saveReport(prefix) {
  if (!results.length) { alert(t('alert_no_results')); return; }
  const sm = $(prefix + '-summary');
  const lines = [
    'Verification Report - ' + new Date().toLocaleString(),
    '='.repeat(60),
    sm ? sm.textContent : '',
    '='.repeat(60), ''
  ];
  for (const r of results) {
    lines.push(`[${r.status}] ${r.file}${r.detail ? '  -- ' + r.detail : ''}`);
  }
  downloadText(lines.join('\n'), 'verify_report_' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'-') + '.txt');
}

// ==================== Init ====================
applyTheme();
rebuildUI();
</script>
